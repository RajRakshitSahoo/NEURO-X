<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEURO-X | AI Cyber Intelligence</title>
    <meta name="description" content="Futuristic AI-Powered Cyber Intelligence System" />
    <!-- Google Fonts: Orbitron (cyber display) + JetBrains Mono (terminal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        width: 100%; height: 100%; overflow: hidden;
        background: #000a00;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #001100; }
      ::-webkit-scrollbar-thumb { background: #00ff41; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #00ffff; }
      /* Selection */
      ::selection { background: #00ff4140; color: #00ff41; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
